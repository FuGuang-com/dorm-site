<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WYK·LYC·LXZ·AYN·LS·JYX 寝室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1e2b2c 0%, #0f1a1b 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        .dorm-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .dorm-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .dorm-sub {
            color: #c0cfb2;
            font-size: 1rem;
            margin-top: 0.5rem;
            border-top: 1px dashed #ffb34766;
            display: inline-block;
            padding-top: 0.5rem;
        }
        .team-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .card {
            background: rgba(30, 40, 35, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            width: 220px;
            padding: 1.2rem 0.8rem 1.5rem;
            text-align: center;
            transition: all 0.25s ease;
            border: 1px solid #ffb34740;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            position: relative;
        }
        .card:hover {
            transform: translateY(-8px);
            border-color: #ffb347;
            background: #2a3a36;
        }
        .avatar {
            font-size: 3.8rem;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.3));
            margin-bottom: 0.5rem;
        }
        .name {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(145deg, #F9F3E2, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .role {
            font-size: 0.75rem;
            background: #00000055;
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            margin: 0.5rem 0 0.3rem;
            color: #e9f5db;
        }
        .badge {
            font-size: 0.7rem;
            background: #2c2e2a;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            color: #ffcf9a;
            display: inline-block;
            margin-top: 5px;
        }
        /* 厌恶版 LS 特殊 */
        .card-disgust {
            background: #2a1a1a;
            border: 1px solid #ff6b6b;
            position: relative;
            overflow: hidden;
        }
        .card-disgust::before {
            content: "⚠️ 厌恶版 ⚠️";
            position: absolute;
            top: 10px;
            right: -25px;
            background: #ff4d4d;
            color: white;
            font-size: 0.6rem;
            font-weight: bold;
            padding: 0.2rem 1.8rem;
            transform: rotate(35deg);
            box-shadow: 0 2px 6px black;
            white-space: nowrap;
        }
        .card-disgust .name {
            background: linear-gradient(145deg, #ffbaba, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        /* 沉默版 JYX */
        .card-silent {
            background: #2a2a2e;
            border: 1px solid #6c8c8c;
        }
        .card-silent::before {
            content: "🤐 沉默版 😐";
            position: absolute;
            top: 10px;
            left: 10px;
            background: #4a5a5a;
            color: #dddddd;
            font-size: 0.55rem;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-weight: bold;
        }
        /* 攻击按钮组 */
        .bomb-btn {
            background: #7a2e2e;
            color: #ffb4b4;
            border: none;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.1s;
            box-shadow: 0 2px 4px black;
        }
        .bomb-btn:active {
            transform: scale(0.95);
        }
        .sock-btn {
            background: #3a5a3a;
            color: #c6f7c6;
            border: none;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 6px;
            margin-left: 6px;
        }
        .attack-counter {
            font-size: 0.65rem;
            margin-top: 8px;
            color: #ffa07a;
            background: #00000066;
            display: inline-block;
            padding: 2px 10px;
            border-radius: 30px;
        }
        .ls-counter {
            background: #4a1515;
        }
        .button-group {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        /* 炸弹动画掉落 */
        .bomb-drop {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            font-size: 2rem;
            animation: dropBomb 0.6s ease-in forwards;
        }
        @keyframes dropBomb {
            0% { transform: translateY(-80px) rotate(0deg); opacity: 1; }
            70% { transform: translateY(60px) rotate(30deg); opacity: 1; }
            100% { transform: translateY(120px) rotate(60deg); opacity: 0; }
        }
        /* 寝室炸弹总计数器 */
        .global-counter {
            text-align: center;
            margin-top: 20px;
            font-size: 1rem;
            background: #00000066;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding: 6px 18px;
            border-radius: 40px;
            color: #ffcf9a;
        }
        .easter-egg {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #8faa7b;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #6c7c64;
        }
        @media (max-width: 640px) {
            .card { width: 170px; padding: 1rem 0.4rem; }
            .avatar { font-size: 2.8rem; }
            .name { font-size: 1.2rem; }
            .bomb-btn, .sock-btn { padding: 3px 8px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="dorm-header">
        <div class="dorm-title">🏠 WYK · LYC · LXZ · AYN · LS(厌恶) · JYX(沉默)</div>
        <div class="dorm-sub">「 炸弹狂欢夜｜沉默是今晚的康桥 」</div>
    </div>

    <div style="text-align: center;">
        <div class="global-counter" id="globalBombCounter">💣 全寝炸弹总次数: 0</div>
    </div>

    <div class="team-grid" id="teamGrid">
        <!-- WYK -->
        <div class="card" data-name="WYK">
            <div class="avatar">🐺</div>
            <div class="name">WYK</div>
            <div class="role">⚡ 熬夜战神</div>
            <div class="badge">#神秘军火商</div>
            <div class="button-group">
                <button class="bomb-btn" data-bomb>💣 扔炸弹</button>
            </div>
        </div>
        <!-- LYC -->
        <div class="card" data-name="LYC">
            <div class="avatar">🍜</div>
            <div class="name">LYC</div>
            <div class="role">🎧 耳机半永久</div>
            <div class="badge">#泡面品鉴大师</div>
            <div class="button-group">
                <button class="bomb-btn" data-bomb>💣 扔炸弹</button>
            </div>
        </div>
        <!-- LXZ（改掉键盘冒奶） -->
        <div class="card" data-name="LXZ">
            <div class="avatar">🎮</div>
            <div class="name">LXZ</div>
            <div class="role">🕹️ 团灭发动机</div>
            <div class="badge">#反向毒奶</div>
            <div class="button-group">
                <button class="bomb-btn" data-bomb>💣 扔炸弹</button>
            </div>
        </div>
        <!-- AYN (没有炸弹按钮) -->
        <div class="card" data-name="AYN">
            <div class="avatar">📸</div>
            <div class="name">AYN</div>
            <div class="role">✨ 气氛组组长</div>
            <div class="badge">#拍照狂魔</div>
            <!-- 没有炸弹按钮 -->
        </div>
        <!-- LS 厌恶版（带炸弹 + 袜子） -->
        <div class="card card-disgust" data-name="LS">
            <div class="avatar">💢</div>
            <div class="name">LS</div>
            <div class="role">💀 厌恶版·VIP</div>
            <div class="badge" style="background:#331111;">#今日没挨打</div>
            <div class="button-group">
                <button class="bomb-btn" data-bomb>💣 扔炸弹</button>
                <button class="sock-btn" id="sockBtnLS">🧦 扔袜子</button>
            </div>
            <div class="attack-counter ls-counter" id="lsAttackCounter">LS个人挨打: 0</div>
        </div>
        <!-- JYX 沉默版 -->
        <div class="card card-silent" data-name="JYX">
            <div class="avatar">🤐</div>
            <div class="name">JYX</div>
            <div class="role">🌙 沉默君主</div>
            <div class="badge">#不语但暴击</div>
            <div class="button-group">
                <button class="bomb-btn" data-bomb>💣 扔炸弹</button>
            </div>
        </div>
    </div>

    <!-- 彩蛋区 -->
    <div class="easter-egg" id="click4surprise">
        🧃 单击此处解锁寝室第十一条公约 🧃
    </div>
    <div class="footer">
        💡 炸弹从天而降｜厌恶版LS额外享受袜子服务 💡
    </div>
</div>

<script>
    // 全局炸弹计数器
    let globalBombCount = 0;
    const globalCounterSpan = document.getElementById('globalBombCounter');
    // LS 袜子专属计数
    let lsSockCount = 0;
    const lsSockCounterSpan = document.getElementById('lsAttackCounter');

    // 炸弹掉落动画函数 (从点击位置或卡片上方掉落)
    function dropBombAnimation(x, y) {
        const bomb = document.createElement('div');
        bomb.textContent = '💣';
        bomb.classList.add('bomb-drop');
        bomb.style.left = (x - 20) + 'px';
        bomb.style.top = (y - 30) + 'px';
        document.body.appendChild(bomb);
        setTimeout(() => {
            bomb.remove();
        }, 700);
    }

    // 显示漂浮消息
    function showMessage(msg, isError = false) {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '30%';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = '#000000cc';
        toast.style.color = '#FFD966';
        toast.style.padding = '8px 18px';
        toast.style.borderRadius = '40px';
        toast.style.fontSize = '0.9rem';
        toast.style.fontWeight = 'bold';
        toast.style.zIndex = '10000';
        toast.style.backdropFilter = 'blur(8px)';
        toast.style.border = '1px solid #ffb347';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }

    // 炸弹点击通用逻辑
    function onBombClick(button, cardElement, memberName) {
        // 增加全局计数
        globalBombCount++;
        globalCounterSpan.innerText = `💣 全寝炸弹总次数: ${globalBombCount}`;
        
        // 获取点击按钮的位置，用于动画起始点
        const rect = button.getBoundingClientRect();
        const x = rect.left + rect.width / 2;
        const y = rect.top;
        dropBombAnimation(x, y);
        
        // 随机消息
        const messages = [
            `💥 ${memberName} 被炸弹正面击中！该！`,
            `🔥 炸弹空降！${memberName} 发型炸成爆炸头！`,
            `💣 轰隆！${memberName} 的床位变成废墟~`,
            `🤯 ${memberName} 怀疑人生：为什么寝室会有炸弹！`,
            `🎉 全寝庆祝！${memberName} 贡献一枚炸弹成就！`
        ];
        const randomMsg = messages[Math.floor(Math.random() * messages.length)];
        showMessage(randomMsg);
        
        // 短暂卡片抖动
        cardElement.style.transform = 'translateX(4px)';
        setTimeout(() => cardElement.style.transform = '', 150);
    }

    // 为所有带 data-bomb 的按钮绑定事件
    document.querySelectorAll('.bomb-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const card = btn.closest('.card');
            const nameSpan = card.querySelector('.name');
            let memberName = nameSpan ? nameSpan.innerText : '室友';
            onBombClick(btn, card, memberName);
        });
    });

    // LS 袜子按钮单独逻辑
    const sockBtn = document.getElementById('sockBtnLS');
    if (sockBtn) {
        sockBtn.addEventListener('click', () => {
            lsSockCount++;
            lsSockCounterSpan.innerText = `LS个人挨打: ${lsSockCount}`;
            const cardLS = document.querySelector('.card-disgust');
            // 闪红
            cardLS.style.transition = 'background 0.1s';
            cardLS.style.backgroundColor = '#aa2e2e';
            setTimeout(() => cardLS.style.backgroundColor = '', 200);
            const sockMessages = [
                "🧦 一只千年臭袜子塞进 LS 枕头！",
                "👃 臭气熏天！LS 当场晕厥！",
                "🤢 LS 捂着鼻子逃跑～ 厌恶版+max",
                "🧦 袜子暴击！LS 宣布投降！"
            ];
            const msg = sockMessages[Math.floor(Math.random() * sockMessages.length)];
            showMessage(msg);
            // 轻微晃动
            cardLS.style.transform = 'translateX(3px)';
            setTimeout(() => cardLS.style.transform = '', 200);
        });
    }

    // 彩蛋
    const eggBtn = document.getElementById('click4surprise');
    let eggCount = 0;
    const eggMessages = [
        "📢 公约11：禁止偷偷扔炸弹 (除了快乐玩耍)",
        "🚫 LS 今天被炸了三次，正追杀凶手",
        "🍕 点外卖必须备注 '人类高质量寝室' 才准取餐",
        "🎵 炸弹掉落后记得打扫卫生",
        "😂 沉默版 JYX 目睹一切，但就是不说话",
        "✨ 寝室暗号：一纸双益 (强行上价值)",
        "☕ 以上纯属虚构，寢室真相比网站刺激多了",
        "🧦 袜子炸弹组合拳，LS 已重伤"
    ];
    eggBtn.addEventListener('click', () => {
        const randomMsg = eggMessages[Math.floor(Math.random() * eggMessages.length)];
        eggBtn.innerHTML = `✨ ${randomMsg} ✨`;
        setTimeout(() => {
            eggBtn.innerHTML = '🧃 再单击一下 换一条寝室真言 🧃';
        }, 2000);
    });
</script>
</body>
</html>
